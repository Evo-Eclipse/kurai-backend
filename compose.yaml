services:
  kurai-backend:
    build:
      context: .
      dockerfile: Containerfile
    image: kurai-backend:local
    ports:
      - "8080:8080"
    env_file:
      - .env
    stop_grace_period: 30s
    volumes:
      - lib-kurai:/var/lib/kurai
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/ready"]
      interval: 20s
      timeout: 1s
      start_period: 60s
      retries: 5

volumes:
  lib-kurai:
